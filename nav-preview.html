<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nav Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --white: #FFFFFF;
      --dark: #18161A;
      --mid: #7A7585;
      --purple: #6B3FA0;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f5f3f7;
      color: var(--dark);
    }

    /* Nav exactly as in portfolio */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 60px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(107,63,160,0.08);
    }
    nav .logo {
      text-decoration: none;
      display: flex;
      align-items: center;
    }
    nav .logo img {
      height: 36px;
      width: auto;
      display: block;
    }
    nav ul { list-style: none; display: flex; gap: 36px; }
    nav ul a {
      font-size: 12.5px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
      transition: color 0.2s;
    }
    nav ul a:hover { color: var(--purple); }

    /* Comparison section */
    .compare {
      margin-top: 120px;
      padding: 40px 60px;
      display: flex;
      flex-direction: column;
      gap: 48px;
    }
    .compare h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 24px;
      color: var(--dark);
    }
    .compare-row {
      display: flex;
      gap: 48px;
      align-items: flex-start;
    }
    .compare-card {
      flex: 1;
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }
    .compare-card h3 {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 20px;
    }
    .mock-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 28px;
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(107,63,160,0.1);
      border-radius: 12px;
    }
    .mock-nav .old-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 17px;
      color: var(--dark);
    }
    .mock-nav .new-logo img {
      height: 36px;
      width: auto;
      display: block;
    }
    .mock-links {
      display: flex;
      gap: 24px;
      list-style: none;
    }
    .mock-links span {
      font-size: 11.5px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mid);
    }
  </style>
</head>
<body>

  <!-- Live nav bar with new logo -->
  <nav>
    <a href="#" class="logo"><img src="assets/jasmine-logo.png" alt="JS logo"></a>
    <ul>
      <li><a href="#">Work</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Resume</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <!-- Before/After comparison -->
  <div class="compare">
    <h2>Nav Logo — Before & After</h2>
    <div class="compare-row">
      <div class="compare-card">
        <h3>Before (text)</h3>
        <div class="mock-nav">
          <span class="old-logo">Jasmine Sayed</span>
          <div class="mock-links">
            <span>Work</span><span>About</span><span>Resume</span><span>Contact</span>
          </div>
        </div>
      </div>
      <div class="compare-card">
        <h3>After (your logo)</h3>
        <div class="mock-nav">
          <span class="new-logo"><img src="assets/jasmine-logo.png" alt="JS logo"></span>
          <div class="mock-links">
            <span>Work</span><span>About</span><span>Resume</span><span>Contact</span>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
